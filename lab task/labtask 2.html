<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Form Validation</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    form { max-width: 360px; padding: 16px; border: 1px solid #ddd; border-radius: 8px; }
    label { display: block; margin-top: 12px; }
    input { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    button { margin-top: 14px; padding: 10px 12px; width: 100%; cursor: pointer; }
    .error { margin-top: 12px; color: #b00020; }
    .success { margin-top: 12px; color: #0a7a2f; }
    .counter { margin-top: 14px; font-weight: bold; }
    ul { margin: 8px 0 0; padding-left: 18px; }
  </style>
</head>
<body>

  <h2>Login</h2>

  <form id="loginForm" novalidate>
    <label for="email">Email</label>
    <input id="email" type="text" placeholder="example@email.com" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Must be 6+ chars and include #" />

    <button type="submit">Login</button>

    <div id="message" class="error"></div>

    <div class="counter">
      Wrong submissions: <span id="wrongCount">0</span>
    </div>
  </form>

  <script>
    const form = document.getElementById("loginForm");
    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("password");
    const messageEl = document.getElementById("message");
    const wrongCountEl = document.getElementById("wrongCount");

    let wrongSubmissions = 0;

    function validateEmail(email) {
      
      return email.includes("@");
    }

    function validatePassword(password) {
    
      return password.length >= 6 && password.includes("#");
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault(); 

      const email = emailEl.value.trim();
      const password = passEl.value; 

      const errors = [];

      if (!validateEmail(email)) {
        errors.push('Email must contain "@".');
      }

      if (password.length < 6) {
        errors.push("Password must be at least 6 characters long.");
      }

      if (!password.includes("#")) {
        errors.push('Password must contain "#".');
      }

      if (errors.length > 0) {
        wrongSubmissions += 1;
        wrongCountEl.textContent = wrongSubmissions;

        messageEl.className = "error";
        messageEl.innerHTML = `
          <strong>Form Error:</strong>
          <ul>
            ${errors.map(err => `<li>${err}</li>`).join("")}
          </ul>
        `;
        return;
      }

   
      messageEl.className = "success";
      messageEl.innerHTML = "<strong>Success!</strong> Login data is valid.";

    });
  </script>

</body>
</html>
